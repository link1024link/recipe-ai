<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe AI — レシピ詳細</title>
<style>
:root {
  --bg-1: #1f1420;
  --bg-2: #3a2230;
  --bg-3: #5a392f;
  --panel: rgba(31, 20, 31, 0.78);
  --line: rgba(255, 238, 226, 0.14);
  --text: #fff7f1;
  --muted: #e6cec0;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  padding: 24px;
  color: var(--text);
  font-family: "Inter", "Hiragino Sans", "Yu Gothic UI", sans-serif;
  background:
    radial-gradient(circle at 15% 20%, rgba(255, 194, 122, 0.22), transparent 24%),
    radial-gradient(circle at 85% 15%, rgba(255, 138, 91, 0.22), transparent 25%),
    linear-gradient(140deg, var(--bg-1), var(--bg-2) 50%, var(--bg-3));
}
.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 24px;
  border: 1px solid var(--line);
  border-radius: 20px;
  background: var(--panel);
}
a.back {
  display: inline-block;
  text-decoration: none;
  color: var(--text);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 8px 10px;
  margin-bottom: 12px;
}
h1 { margin: 6px 0 8px; }
.meta { color: var(--muted); margin: 0 0 12px; }
ul, ol { padding-left: 1.2rem; }
li { margin-bottom: 6px; line-height: 1.6; }
.empty { color: var(--muted); }
</style>
</head>
<body>
  <main class="container">
    <a class="back" href="/">← 一覧へ戻る</a>
    <div id="content"></div>
  </main>

<script>
const LATEST_RECIPES_KEY = "recipe-ai-latest-recipes";
const content = document.getElementById("content");

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function getIndex() {
  const params = new URLSearchParams(location.search);
  const value = Number(params.get("i"));
  return Number.isInteger(value) && value >= 0 ? value : 0;
}

function loadData() {
  try {
    const raw = localStorage.getItem(LATEST_RECIPES_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch {
    return null;
  }
}

const data = loadData();
const index = getIndex();
const recipes = Array.isArray(data?.recipes) ? data.recipes : [];
const recipe = recipes[index];

if (!recipe) {
  content.innerHTML = '<p class="empty">表示できるレシピがありません。生成画面からもう一度お試しください。</p>';
} else {
  const ingredients = Array.isArray(recipe.ingredients) ? recipe.ingredients : [];
  const steps = Array.isArray(recipe.steps) ? recipe.steps : [];
  content.innerHTML = `
    <h1>${escapeHtml(recipe.name || "レシピ")}</h1>
    <p class="meta">候補: ${index + 1} / ${recipes.length} ・ ${escapeHtml(recipe.selected_ingredients || data?.message || "-")}</p>

    <h2>材料</h2>
    <ul>${ingredients.map(i => `<li>${escapeHtml(i)}</li>`).join("") || "<li>-</li>"}</ul>

    <h2>手順</h2>
    <ol>${steps.map(s => `<li>${escapeHtml(s)}</li>`).join("") || "<li>-</li>"}</ol>

    <p>🔥 ${escapeHtml(recipe.calories ?? "-")} kcal</p>
  `;
}
</script>
</body>
</html>
